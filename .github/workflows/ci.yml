name: CAFlow CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: caflow_test
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ruff lint (new code only — see pyproject.toml; legacy code tightened in Phase 5)
      working-directory: ./backend
      run: ruff check app/integrations app/core/logging.py app/core/sentry.py

    - name: Ruff format check (new code only)
      working-directory: ./backend
      run: ruff format --check app/integrations app/core/logging.py app/core/sentry.py

    - name: mypy
      working-directory: ./backend
      run: mypy

    - name: Run Pytest
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+asyncpg://runner:password@localhost:5432/caflow_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-12345
      run: |
        pytest tests/ -v

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: ./frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: ESLint
      working-directory: ./frontend
      run: npm run lint

    - name: TypeScript
      working-directory: ./frontend
      run: npm run typecheck

    - name: Run Jest
      working-directory: ./frontend
      run: npm run test
