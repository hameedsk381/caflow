[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["alembic/versions", "venv", "venv_linux", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "C4", "SIM", "RUF"]
ignore = [
  "E501",
  "UP017",  # datetime.UTC requires py311; we keep timezone.utc for py310 dev compat
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
strict = false
files = ["app/integrations", "app/core/logging.py", "app/core/sentry.py"]
ignore_missing_imports = true
follow_imports = "skip"
disable_error_code = ["type-arg", "no-untyped-def"]
